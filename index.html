<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azka Ganteng 🐱 — Capture Every Purr-fect Moment</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
</head>
<body>

  <!-- ─── Cat Loader ─── -->
  <div class="cat-loader" id="cat-loader">
    <div class="loader-cat">🐱</div>
    <div class="loader-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="loader-text">Loading gallery…</div>
  </div>

  <!-- ─── Floating Paws ─── -->
  <div class="floating-hearts" aria-hidden="true"></div>

  <!-- ─── Lightbox ─── -->
  <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lb-close" aria-label="Close">✕</button>
    <div class="lightbox-content">
      <img class="lightbox-img" id="lb-img" src="" alt="" />
      <div class="lightbox-caption" id="lb-caption"></div>
    </div>
  </div>

  <div class="page-wrapper">

    <!-- ─── Header ─── -->
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="site-logo">
          <span class="logo-cat">🐱</span>
          Azka Ganteng
        </a>
        <nav class="nav-links">
          <a href="index.html" class="nav-link active">🐾 Gallery</a>
          <a href="admin.html" class="nav-link">✨ Admin</a>
        </nav>
      </div>
    </header>

    <!-- ─── Hero ─── -->
    <section class="hero" aria-label="Hero">
      <div class="hero-badge">🐾 &nbsp; Purr-fect Photo Collection</div>

      <h1 class="hero-title">
        Every Photo is a<br><span>Purr-fect Memory</span>
      </h1>

      <p class="hero-subtitle">A cozy gallery for all your adorable moments 🐾</p>

      <!-- Whisker decoration -->
      <div class="hero-whiskers">
        <span class="whisker whisker-l"></span>
        <span style="font-size:1.4rem">🐱</span>
        <span class="whisker whisker-r"></span>
      </div>

      <div class="paw-divider">
        <span>🐾</span>
      </div>
    </section>

    <!-- ─── Gallery ─── -->
    <main class="gallery-section" id="main-gallery">
      <div class="section-header">
        <h2 class="section-title">🖼 Our Memories</h2>
        <span class="photo-count" id="photo-count">Loading…</span>
      </div>

      <div class="gallery-grid" id="gallery-grid">
        <!-- Injected by JS -->
      </div>
    </main>

    <!-- ─── Footer ─── -->
    <footer class="site-footer">
      Made with <span>🐾</span> and lots of purrs — Neko Gallery &copy; 2025
    </footer>

  </div><!-- /page-wrapper -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
